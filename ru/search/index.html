    "url": "https://pavelshlepnev.space/music/2023/09/01/zamoskvorechye.html",
    "title": "Замоскворечье",
    "body": "2023/09/01 - Признаюсь: мне никогда не нравилась бардовская песня. Скучные аккорды, минимум аранжировки, заунывный текст, в который нужно вдумываться. Легче прочитать стих. Но когда почти два года назад Вера Толченникова прислала мне свою песню “Замоскворечье” примерно в таком стиле, я вдруг проникся и решил её аранжировать (конечно, не совсем в бардовском стиле). Это была почти готова песня с интересной композицией: отчаянный первый куплет с гитарным боем, нежный и проникновенный второй куплет с перебором, певучие припевы, полные надежды, и вкрадчивая концовка, исполняемая почти шёпотом. Я подумал, добавлю-ка я туда помимо гитары ритм-секцию, орган и, наверное, скрипки. А на втором куплете ещё флейту. Я так этим увлёкся, что даже отдельно сделал трек проигрыша в исполнении только скрипок и флейты. Pavel Shlepnev · Замоскворечье — соло для флейты и струнного квартета (демо)Я показал всё это Вере. Она была в восторге, сказав мне, что я выразил в музыке то, что было невозможно выразить словами: то отчаяние и пожар любви, которой суждено очень скоро забыться, желание летать, даже если в следующую секунду тебя подстрелят. Мы начали готовить песню к записи. Сначала репетировали на биофаке, втихаря, вдали от посторонних глаз, выходя поздно вечером на лестницу, чтобы прикинуть, как петь, с какой интонацией. Приняли решение, что в песне должны обязательно звучать живые инструменты. Наша коллега по работе, Елизавета Романова, согласилась сыграть партию флейты. Надо было подтянуть навыки игры, и мы с Лизой начали ездить к её педагогу по флейте, Анне Орленовне Плющевой. Так я понял, что тоже хочу осваивать искусство игры на этом прекрасном инструменте. Это было не просто.   Сколько я раз ни репетировал партию флейты, не получалось у меня сыграть так же красиво, как у Лизы. Но помимо флейты надо было записать струнные. У Веры была знакомая, обучавшая её игре на скрипке, Анна Огнева. Мы долго думали, приглашать ли её, боялись, что не согласится, ибо кто мы, а кто она!. . Настоящая профессиональная скрипачка из Московской Филармонии! И как она играет! Но мы всё-таки набрались наглости её позвать на репетицию. Помимо неё были найдены вторая скрипка – Татьяна Филоненко, которую я нашёл через общую знакомую, её подруга, альтистка Александра Храмова и виолончелист Виктор Мальков, которого Вера случайно увидела игравшего Рахманинова в холле перед аудиторией ББА на биофаке. Репетировали мы прямо на работе, в НИИ развиия мозга и высших достижений, в субботу утром, когда не было детей, которых мы реабилитируем, и других сотрудников. И тут со мной и Верой случилось второе рождение… Я никогда до этого не слышал, как играют мою музыку, она вдруг оказалась вне меня, это был удивительный опыт! Тот день был один из самых счастливых дней в моей жизни: я впервые дирижировал струнным ансамблем!   Был один забавный момент: Анна Огнева, исполняющая партию первой скрипки, сыграла первую ноту своей партии, проведя смычком вниз, на что я сделал замечание, что надо тут вести смычком вверх. На её ошеломлённое “Почему?!” я ответил: “Потому что так было в моём сне”. О, эти полные недоумения глаза, посмотревшие сначала на меня, а потом на Веру! Впрочем, мы быстро пришли к согласию. Нам было достаточно двух сводных репетиций, и мы пошли на студию, которую нам посоветовала Анна. Это была студия “Эпос” при Московском Губернском театре, та самая, где был записан голос Сергея Безрукова в песне “Берёзы”. Скрипки мы записали с первого раза. А вот над всем остальным пришлось помучиться. Но результат, как мне кажется, того стоил. В последний момент мы изменили аккорды между первым и вторым куплетом, а также концовку, идею которой нам подкинул звукорежиссёр Олег Гуменов. В вышедшем сингле два трека. Первый – это соло скрипки в исполнении Анны Огневой, партия припева, которая нас вдохновляла идти до конца. Второй трек – сама песня. Мне её хочется переслушивать, чтобы снова и снова проживать всё то чудо, которое с нами произошло, чтобы хоть на мгновенье летать!. . Если вдруг у вас созрела музыкальная идея на базе этой песни, вам срочно нужны ноты или вы вдруг решили сделать ремикс, – проект песни доступен на Арткаскаде. "
    }, {
    "id": 8,
    "url": "https://pavelshlepnev.space/music/2022/10/29/no.html",
    "title": "Нет",
    "body": "2022/10/29 - Вышел мой первый совместный релиз с Верой Толченниковой – песня “Нет”. Немного истории о том, как мы пришли к этому. С Верой Толченниковой я познакомился в Студенческих Театральных Мастерских МГУ ещё до поступления на кафедру высшей нервной деятельности биофака. Потом она как-то попросила у Константина Викторовича Неверова, самого весёлого преподавателя факультета, жидкий азот для заморозки мозгов крыс, на которых она ставила эксперименты. Я подумал: какие смелые и красивые девушки водятся на кафедре, которые занимаются такой интереснейшей наукой, как нейрофизиология! Это добавляло престижа кафедре в моих газах, куда я впоследствии и поступил. Осенью 2013 года мы стали знакомиться с творчеством друг друга. Ей понравилась моя “What the Rain Tries to Say”, а мне – её композиция “Stay Close”, посвящённая её научной руководительнице. Переслушивая её сейчас, нахожу, что мы всё-таки чем-то похожи… И хотя Вера прибеднялась тогда, охарактеризовывая свои музыкальные сочинения как “грубый примитивизм”, идейно они были великолепны, с энергетичным эмоциональным посылом, который легко читался. Знаете, бывает музыка, которая непонятно почему родилась у композитора: сколько ни слушай – не понимаешь идеи, не схатываешь сюжет. И вот это совершенно не относится к музыке Веры. Возможно, именно эта ясность позволила проявиться нашему творческому союзу. Вера читает на кафере курс “Основы высшей нервной деятельности”. И когда пришло время сдавать мне экзамен по этому курсу, я попал к ней и ушёл с пересдачей. Зато потом сдал на отлично. После этого у Веры появилась книжка о том, как сдавать экзамены. Я помню, у нас тогда была долгая беседа о мотивации в жизни. Потом было участие в гранте, который, мне казалось, я завалил. Мне нужно было выступать на конференции, но из-за того, что я не успевал с результатами, мотивации выступать на докладе не было, и у нас тогда был острый конфликт по поводу того, какие же результаты представлять. Но связь друг с другом мы смогли сохранить, поскольку периодически Вере нужны были разработанные мной программы, чтобы обсчитать результаты своих экспериментов. А потом она позвала меня в НИИ развития мозга и высших достижений РУДН. И показала песни, которые написала. Они были классные, я сразу предложил их аранжировать. Однако, когда дело дошло до записи, Вера не сдала мне экзамен по вокалу. И теперь я отправил её на пересдачу. После нескольких недель работы, у Веры получилось сдать мой экзамен, и мы пошли в студию и записали песню. Ещё через два месяца песня была сведена. Сводил, в основном, я, и это было непросто: хотелось, чтобы всё звучало идеально. В этом я до сих пор не спец. В итоге я доверил довести до ума человеку на студии – Виктору Васильеву, и она, наконец, обрела нужное звучание!     Вера Толченникова у микрофона в студииА первый набросок песни звучал так: Pavel Shlepnev · Вера Толченникова – Нет (набросок)Когда пришло время выпускать релиз, нужно было срочно найти фотографа для обложки сингла. И никто бы не сделал эту фотосессию лучше, чем Ксения Ладыгина, которой мы позвонили буквально за день до съёмок, ибо другого времени невозможно было найти. Мы полазили по заборам в Можайском районе, прямо как в детстве, и получилось то, что мы хотели! Сейчас я осознаю, что всё наше творчество рождалось именно из глубокого понимания друг друга. И это понимание невозможно без доверия и опоры друг на друга, без бережного отношения к идеям друг друга. Я очень рад, что у меня получилось реализовать себя в музыке через это взаимопонимание! Песня доступна на всех музыкальных сервисах. Если у вас вдруг возникнет желание пропустить её через свой творческий взгляд, переделать её под собственное видение – придумать альтернативную аранжировку или сделать ремикс, – проект можно найти на Арткаскаде. "

    "body": "2022/07/08 - Часто ли с вами случается такое, что после прочтения какой-либо книги или просмотра какого-либо фильма вам хочется сочинить продолжение? Однажды я прочитал один фанфик на Смешариков и подумал, а почему бы авторам Смешариков не использовать эти идеи в своих следующих сериях? То же самое было и с моим самым любимым сериалом “Остаться в живых” (“Lost”): интерпретации фанатов относительно той или иной серии были порой интереснее сюжета самой серии. Видимо, проблема в том, что фанатское творчество обычно малоинтересно самим авторам. Или нет? Во всяком случае, учитывая широкое развитие интернет-коммуникаций, мне кажется странным, что я до сих пор не натолкнулся на платформу, где фанаты могут продолжать творчество авторов, а авторы – творчество фанатов. Поэтому я решил “изобрести велосипед” и сделать свою платформу, которую я назвал “Арткаскад”. Вы размещаете свой контент, его кто-то продолжает, и вы получаете гонорар. Чем больше продолжателей вашего творчества, тем больше вы можете заработать. Сейчас я ищу авторов, чтобы протестировать все функции сайта и получить обратную связь. Присоединяйтесь! "

var idx = lunr(function () {
    this.ref('id')
    this.field('title')
    this.field('body')

    documents.forEach(function (doc) {
        this.add(doc)
    }, this)
});
function lunr_search(term) {
    document.getElementById('lunrsearchresults').innerHTML = '<ul></ul>';
    if(term) {
        document.getElementById('lunrsearchresults').innerHTML = "<p>Search results for '" + term + "'</p>" + document.getElementById('lunrsearchresults').innerHTML;
        //put results on the screen.
        var results = idx.search(term);
        if(results.length>0){
            //console.log(idx.search(term));
            //if results
            for (var i = 0; i < results.length; i++) {
                // more statements
                var ref = results[i]['ref'];
                var url = documents[ref]['url'];
                var title = documents[ref]['title'];
                var body = documents[ref]['body'].substring(0,160)+'...';
                document.querySelectorAll('#lunrsearchresults ul')[0].innerHTML = document.querySelectorAll('#lunrsearchresults ul')[0].innerHTML + "<li class='lunrsearchresult'><a href='" + url + "'><span class='title'>" + title + "</span><br /><span class='body'>"+ body +"</span><br /><span class='url'>"+ url +"</span></a></li>";
            }
        } else {
            document.querySelectorAll('#lunrsearchresults ul')[0].innerHTML = "<li class='lunrsearchresult'>No results found...</li>";
        }
    }
    return false;
}
</script>
